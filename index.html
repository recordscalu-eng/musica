<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody Harmonizer</title>
<style>
body { font-family: Arial; margin: 0; padding: 20px; background: #1a1a1a; color: #fff; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { text-align: center; }
.controls { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
button { padding: 10px 20px; font-size: 14px; cursor: pointer; background: #0066cc; color: white; border: none; border-radius: 5px; }
button:hover { background: #0052a3; }
button.active { background: #00cc00; }
input { padding: 8px; font-size: 14px; }
.display { display: flex; gap: 20px; margin: 20px 0; justify-content: center; flex-wrap: wrap; }
.info-box { background: #333; padding: 15px; border-radius: 5px; text-align: center; }
canvas { border: 1px solid #666; width: 100%; margin-top: 20px; background: #000; }
</style>
</head>
<body>
<div class="container">
<h1>🎵 Melody Harmonizer</h1>

<div class="controls">
<button id="initBtn">🎤 Iniciar Micrófono</button>
<button id="recordBtn">⚫ Grabar</button>
<button id="metronomeBtn">🔔 Metrónomo OFF</button>
<label>BPM: <input type="number" id="bpm" value="120" min="40" max="200"></label>
<label>Compás: <select id="timeSignature">
<option value="2/4">2/4</option>
<option value="3/4">3/4</option>
<option value="4/4" selected>4/4</option>
<option value="6/8">6/8</option>
</select></label>
<label>Tonalidad: <select id="key">
<option value="C">C Mayor</option>
<option value="G">G Mayor</option>
<option value="D">D Mayor</option>
<option value="A">A Mayor</option>
<option value="E">E Mayor</option>
<option value="F">F Mayor</option>
</select></label>
</div>

<div class="display">
<div class="info-box">
<strong>Nota:</strong><br><span id="noteDisplay">---</span>
</div>
<div class="info-box">
<strong>Frecuencia:</strong><br><span id="freqDisplay">---</span>
</div>
<div class="info-box">
<strong>Confianza:</strong><br><span id="confidenceDisplay">---</span>
</div>
<div class="info-box">
<strong>Estado:</strong><br><span id="statusDisplay">Listo</span>
</div>
</div>

<canvas id="canvas"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
