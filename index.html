
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody Harmonizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 30px; }
.controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
button { padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
button:hover { background: #0052a3; }
button.active { background: #cc0000; }
input { padding: 8px; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; }
.display { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
.info-box { background: #222; padding: 15px; border-radius: 5px; text-align: center; }
.info-label { font-size: 12px; color: #999; margin-bottom: 5px; }
.info-value { font-size: 24px; font-weight: bold; }
canvas { border: 1px solid #333; background: #0a0a0a; width: 100%; margin-top: 20px; }
</style>
</head>
